name: Deploy to Azure Static Web Apps

# Auto-deploy on every push to main; also spins up preview environments for PRs
# and tears them down when the PR closes. The deployment token lives in the
# repo secret AZURE_STATIC_WEB_APPS_API_TOKEN. Server secrets (GRAPH_*, etc.)
# are NOT here — they live in the Static Web App's application settings.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Build the SPA ourselves so the deploy uploads the compiled bundle.
      # (Letting the SWA/Oryx build run was shipping the un-built source —
      # index.html pointing at /src/main.tsx — which rendered a white screen.)
      # Install BOTH before building: the root `tsc -b` also type-checks api/,
      # so @azure/functions must be present (api/node_modules) first.
      - name: Install dependencies (root + api)
        run: |
          npm ci
          npm --prefix api ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_CALCOM_LINK: "harrison-alexander-58mgnt/30min"
      - name: Build API (Azure Functions v4)
        run: npm --prefix api run build
      - name: Deploy prebuilt output
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"      # already-built SPA
          api_location: "api"       # already-built Functions
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
